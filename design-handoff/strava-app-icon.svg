<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: brand indigo gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle dot grid texture -->
  <g fill="#FFFFFF" opacity="0.04">
    <circle cx="64" cy="64" r="2"/><circle cx="128" cy="64" r="2"/>
    <circle cx="192" cy="64" r="2"/><circle cx="256" cy="64" r="2"/>
    <circle cx="320" cy="64" r="2"/><circle cx="384" cy="64" r="2"/>
    <circle cx="448" cy="64" r="2"/>
    <circle cx="64" cy="448" r="2"/><circle cx="128" cy="448" r="2"/>
    <circle cx="192" cy="448" r="2"/><circle cx="256" cy="448" r="2"/>
    <circle cx="320" cy="448" r="2"/><circle cx="384" cy="448" r="2"/>
    <circle cx="448" cy="448" r="2"/>
  </g>

  <!-- Glowing performance curve (the brand mark) -->
  <g transform="translate(80 200)">
    <!-- Glow halo layers -->
    <path d="M 0 160 Q 90 -20, 200 100 T 360 60"
          stroke="#4F46E5" stroke-width="44" fill="none"
          stroke-linecap="round" opacity="0.4" filter="url(#glow)"/>
    <path d="M 0 160 Q 90 -20, 200 100 T 360 60"
          stroke="#A5B4FC" stroke-width="20" fill="none"
          stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
    <!-- Crisp top line -->
    <path d="M 0 160 Q 90 -20, 200 100 T 360 60"
          stroke="#FFFFFF" stroke-width="8" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Endpoint coral dot — finish marker -->
    <circle cx="360" cy="60" r="22" fill="#F97066" opacity="0.4" filter="url(#glow)"/>
    <circle cx="360" cy="60" r="12" fill="#F97066"/>
  </g>
</svg>
