<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Значимость признаков (Для отчета)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; padding: 20px; }
  .instruction { background: #eff6ff; color: #1e3a8a; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; border-left: 5px solid #3b82f6;}
  .chart-wrapper { width: 100%; max-width: 900px; margin: 0 auto; height: 500px; }
</style>
</head>
<body>

<div class="instruction">
  📸 Горизонтальная гистограмма значимости признаков (Feature Importance - метрика Gain). Идеально подходит для Рисунка 3.6. Разверни и сделай скриншот.
</div>

<div class="chart-wrapper">
  <canvas id="importanceChart"></canvas>
</div>

<script>
  Chart.register(ChartDataLabels);
  const ctx = document.getElementById('importanceChart').getContext('2d');
  
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [
        'Индекс беговой формы (VDOT)',
        'Возраст атлета (Age)',
        'Сложность трассы (K_course)',
        'Средний недельный объём (Weekly Mileage)',
        'Показатель готовности (TSB перед стартом)',
        'Тепловой стресс (WBGT)',
        'Максимальная длительная тренировка',
        'Показатель фитнеса (CTL)',
        'Индекс массы тела (BMI)',
        'Беговой стаж (Years Running)'
      ],
      datasets: [{
        label: 'Значимость признака (Gain), %',
        data: [41, 14, 12, 10, 7, 6, 4, 3, 2, 1],
        backgroundColor: '#3b82f6',
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y', // Горизонтальная гистограмма
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: 'Относительная значимость признаков модели XGBoost (метрика Gain)',
          font: { size: 16, family: "'Segoe UI', sans-serif", weight: 'bold' },
          padding: { bottom: 20 }
        },
        datalabels: {
          anchor: 'end',
          align: 'right',
          color: '#333',
          font: { weight: 'bold', size: 14 },
          formatter: function(value) {
            return value + '%';
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          max: 45,
          title: { display: true, text: 'Вес признака (Gain), %', font: { weight: 'bold' } },
        },
        y: {
          ticks: { font: { size: 13, weight: '500' } }
        }
      },
      layout: {
        padding: { right: 40 } // Отступ справа, чтобы проценты не обрезались
      }
    }
  });
</script>
</body>
</html>
