<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; padding: 20px; }
  .chart-wrapper { width: 100%; max-width: 900px; margin: 0 auto; height: 500px; }
</style>
</head>
<body>
<div class="chart-wrapper">
  <canvas id="residualsChart"></canvas>
</div>

<script>
  const ctx = document.getElementById('residualsChart').getContext('2d');
  
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['< -25', '-20', '-15', '-10', '-5', '0', '+5', '+10', '+15', '+20', '> +25'],
      datasets: [{
        label: 'Количество записей',
        data: [22, 78, 254, 635, 1200, 1553, 1270, 706, 311, 99, 37],
        backgroundColor: 'rgba(59, 130, 246, 0.7)',
        borderColor: 'rgba(37, 99, 235, 1)',
        borderWidth: 1,
        barPercentage: 1.0,
        categoryPercentage: 1.0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: 'Гистограмма распределения остатков прогноза гибридной модели',
          font: { size: 16, family: "'Segoe UI', sans-serif", weight: 'bold' },
          padding: { bottom: 20 }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Ошибка прогноза (Прогноз - Факт), минуты', font: { weight: 'bold' } },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          title: { display: true, text: 'Количество марафонов (частота)', font: { weight: 'bold' } }
        }
      }
    }
  });
</script>
</body>
</html>
