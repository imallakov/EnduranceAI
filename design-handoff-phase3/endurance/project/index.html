<style>
  html, body { margin: 0; padding: 0; background: #F5F4F1; font-family: 'Inter', system-ui, sans-serif; color: #0F172A; }
  * { box-sizing: border-box; }

  /* Design tokens */
  :root {
    --primary: #1E1B4B;
    --primary-2: #4F46E5;
    --primary-50: #EEF0FF;
    --accent: #F97066;
    --accent-700: #E0544A;
    --success: #10B981;
    --warning: #F59E0B;
    --danger: #DC2626;
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --border: #E7E5E4;
    --border-soft: #F1EFEC;
    --text: #0F172A;
    --muted: #64748B;
    --muted-2: #94A3B8;
  }

  .mono { font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }

  /* Section label style — small caps, tracked */
  .label-sm { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .label-md { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

  /* Card baseline */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; transition: box-shadow 180ms ease, transform 180ms ease, border-color 180ms ease; }
  .card.hoverable:hover { box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px -12px rgba(15,23,42,0.10); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 14px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; transition: background 120ms ease, border-color 120ms ease, color 120ms ease; font-family: inherit; }
  .btn-coral { background: var(--accent); color: #fff; }
  .btn-coral:hover { background: var(--accent-700); }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-ghost:hover { background: var(--bg); border-color: #D6D3D1; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #161342; }

  /* Skeleton edges */
  .divider { height: 1px; background: var(--border); }

  /* Chart line transitions */
  .chart-path { transition: opacity 200ms ease; }

  /* Sidebar nav row */
  .nav-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; color: #44403C; font-size: 13.5px; font-weight: 500; cursor: pointer; line-height: 1; transition: background 100ms ease, color 100ms ease; }
  .nav-row:hover { background: #F1EFEC; color: var(--text); }
  .nav-row.active { background: #ECEAFB; color: var(--primary); }
  .nav-row.active svg { color: var(--primary); }
  .nav-row svg { color: #78716C; flex-shrink: 0; }

  /* Activity row hover */
  .act-row { transition: background 120ms ease; cursor: pointer; }
  .act-row:hover { background: var(--bg); }

  /* Pill */
  .pill { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border-radius: 6px; font-size: 11.5px; font-weight: 600; }
  .pill-indigo { background: var(--primary-2); color: #fff; }
  .pill-soft-success { background: #ECFDF5; color: #047857; }
  .pill-soft-warn { background: #FFFBEB; color: #B45309; }
  .pill-soft-muted { background: #F1F5F9; color: #475569; }
  .pill-soft-indigo { background: #EEF2FF; color: #4338CA; }

  /* Tag chip */
  .chip { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--muted); background: #fff; }
  .chip.active { color: var(--text); border-color: #C7C5C2; background: #fff; }

  /* Scrollbar reset for areas */
  .nice-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: #E7E5E4; border-radius: 4px; }
  .nice-scroll::-webkit-scrollbar-track { background: transparent; }

  /* Tooltip */
  .chart-tooltip { position: absolute; background: var(--primary); color: #fff; font-size: 11px; padding: 8px 10px; border-radius: 6px; pointer-events: none; transform: translate(-50%, -110%); white-space: nowrap; box-shadow: 0 8px 24px -8px rgba(15,23,42,0.4); z-index: 5; }
  .chart-tooltip:after { content: ''; position: absolute; left: 50%; bottom: -4px; width: 8px; height: 8px; background: var(--primary); transform: translateX(-50%) rotate(45deg); }

  /* Focus rings */
  .focus-input:focus { outline: none; border-color: var(--primary-2); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
</style>
</head>
